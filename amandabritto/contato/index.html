<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Amanda Britto</title>
<meta name="description" content="Get in touch with Amanda Britto.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ice:#F4F4F7;--ink:#1D1B24;--ink-soft:#4A4756;--purple:#4E2E7F;--purple-soft:#6C4BA6;--lilac:#8C86A3;--line:rgba(29,27,36,.14);--serif:'Cormorant Garamond',Georgia,serif;--sans:'Manrope',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--ice);color:var(--ink);min-height:100vh;line-height:1.65;-webkit-font-smoothing:antialiased}
a{color:var(--purple);text-decoration:none}
a:hover{color:var(--purple-soft)}
.wrap{max-width:560px;margin:0 auto;padding:48px 28px 80px}
.top{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.back{font-family:var(--mono);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--lilac)}
.back:hover{color:var(--purple)}
.lang-btn{border:1px solid var(--line);background:#fff;border-radius:99px;padding:7px 12px;cursor:pointer;font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;color:var(--ink)}
h1{margin-top:48px;font-family:var(--serif);font-weight:500;font-size:clamp(2.4rem,6vw,3.4rem);color:var(--ink);line-height:1.1}
.lead{margin-top:14px;color:var(--ink-soft);font-size:.95rem}
form{margin-top:40px;display:grid;gap:22px}
label{display:grid;gap:8px;font-family:var(--mono);font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--lilac)}
input,textarea{width:100%;background:#FBFBFD;border:1px solid var(--line);border-radius:4px;padding:14px 16px;color:var(--ink);font-family:var(--sans);font-size:1rem;outline:none;transition:border-color .25s}
input:focus,textarea:focus{border-color:var(--purple)}
textarea{min-height:160px;resize:vertical}
button[type=submit]{justify-self:start;margin-top:8px;padding:14px 28px;border:1px solid var(--purple);border-radius:2px;background:var(--purple);color:#fff;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .25s,transform .25s}
button[type=submit]:hover{background:var(--purple-soft);border-color:var(--purple-soft);transform:translateY(-1px)}
.hint{margin-top:28px;font-size:.82rem;color:var(--lilac)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="../index.html" data-i18n="back">← Amanda Britto</a>
      <button type="button" class="lang-btn" id="langToggle" aria-label="Language">EN</button>
    </div>
    <h1 data-i18n="title">Get in touch</h1>
    <p class="lead" data-i18n="lead">Insira nome e e-mail para encaminhar a sua mensagem. Seu contato será retornado assim que possível.</p>
    <form id="contactForm" novalidate>
      <label><span data-i18n="name">Name</span><input type="text" name="name" required autocomplete="name" data-i18n-ph="ph.name" placeholder="Your name"></label>
      <label><span data-i18n="email">Email</span><input type="email" name="email" required autocomplete="email" data-i18n-ph="ph.email" placeholder="you@email.com"></label>
      <label><span data-i18n="message">Message</span><textarea name="message" required data-i18n-ph="ph.message" placeholder="Your message"></textarea></label>
      <button type="submit" data-i18n="send">Send</button>
    </form>
    <p class="hint" data-i18n="hint">If your email app does not open, copy your message and use the contact options on the main site.</p>
  </div>
<script>
const TO='ab.murtinho@hotmail.com';
const LANGS=['en','pt','fr','es','it','de'];
const I18N={
  en:{back:'← Amanda Britto',title:'Get in touch',lead:'Enter your name and email to send your message. Your contact will be returned as soon as possible.',name:'Name',email:'Email',message:'Message',send:'Send',hint:'If your email app does not open, copy your message and use the contact options on the main site.','ph.name':'Your name','ph.email':'you@email.com','ph.message':'Your message',alert:'Please fill in all fields.',subject:'Contact via Amanda Britto site — '},
  pt:{back:'← Amanda Britto',title:'Entre em contato',lead:'Insira nome e e-mail para encaminhar a sua mensagem. Seu contato será retornado assim que possível.',name:'Nome',email:'E-mail',message:'Mensagem',send:'Enviar',hint:'Se o aplicativo de e-mail não abrir, copie a mensagem e use as opções de contato no site principal.','ph.name':'Seu nome','ph.email':'voce@email.com','ph.message':'Sua mensagem',alert:'Preencha todos os campos.',subject:'Contato pelo site Amanda Britto — '},
  fr:{back:'← Amanda Britto',title:'Contact',lead:'Indiquez nom et e-mail pour envoyer votre message. Votre contact sera rappelé dès que possible.',name:'Nom',email:'E-mail',message:'Message',send:'Envoyer',hint:'Si l’application ne s’ouvre pas, copiez votre message et utilisez les options de contact du site.','ph.name':'Votre nom','ph.email':'vous@email.com','ph.message':'Votre message',alert:'Veuillez remplir tous les champs.',subject:'Contact via le site Amanda Britto — '},
  es:{back:'← Amanda Britto',title:'Contacto',lead:'Introduce nombre y correo para enviar tu mensaje. Tu contacto será respondido lo antes posible.',name:'Nombre',email:'Correo',message:'Mensaje',send:'Enviar',hint:'Si no se abre el correo, copia el mensaje y usa las opciones de contacto del sitio.','ph.name':'Tu nombre','ph.email':'tu@email.com','ph.message':'Tu mensaje',alert:'Completa todos los campos.',subject:'Contacto desde el sitio Amanda Britto — '},
  it:{back:'← Amanda Britto',title:'Contatti',lead:'Inserisci nome e e-mail per inviare il messaggio. Il contatto sarà ricontattato il prima possibile.',name:'Nome',email:'E-mail',message:'Messaggio',send:'Invia',hint:'Se l’app non si apre, copia il messaggio e usa i contatti del sito.','ph.name':'Il tuo nome','ph.email':'tu@email.com','ph.message':'Il tuo messaggio',alert:'Compila tutti i campi.',subject:'Contatto dal sito Amanda Britto — '},
  de:{back:'← Amanda Britto',title:'Kontakt',lead:'Name und E-Mail eingeben, um die Nachricht zu senden. Dein Kontakt wird so bald wie möglich beantwortet.',name:'Name',email:'E-Mail',message:'Nachricht',send:'Senden',hint:'Wenn die App nicht öffnet, kopiere die Nachricht und nutze die Kontaktoptionen auf der Hauptseite.','ph.name':'Dein Name','ph.email':'du@email.com','ph.message':'Deine Nachricht',alert:'Bitte alle Felder ausfüllen.',subject:'Kontakt über die Website Amanda Britto — '}
};
let LANG='en';
function apply(){
  const d=I18N[LANG]||I18N.en;
  document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(d[k])el.textContent=d[k];});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{const k=el.getAttribute('data-i18n-ph');if(d[k])el.placeholder=d[k];});
  document.getElementById('langToggle').textContent=LANG.toUpperCase();
}
try{const s=localStorage.getItem('ab_lang');if(s&&LANGS.includes(s))LANG=s;}catch(e){}
apply();
document.getElementById('langToggle').onclick=()=>{
  LANG=LANGS[(LANGS.indexOf(LANG)+1)%LANGS.length];
  try{localStorage.setItem('ab_lang',LANG);}catch(e){}
  apply();
};
document.getElementById('contactForm').addEventListener('submit',function(e){
  e.preventDefault();
  const d=I18N[LANG]||I18N.en;
  const fd=new FormData(this);
  const name=(fd.get('name')||'').toString().trim();
  const email=(fd.get('email')||'').toString().trim();
  const message=(fd.get('message')||'').toString().trim();
  if(!name||!email||!message){alert(d.alert);return;}
  const subject=encodeURIComponent(d.subject+name);
  const body=encodeURIComponent('Nome / Name: '+name+'\nE-mail: '+email+'\n\n'+message);
  window.location.href='mailto:'+TO+'?subject='+subject+'&body='+body;
});
</script>
</body>
</html>
