<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Amanda Britto</title>
<meta name="description" content="Get in touch with Amanda Britto.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ice:#F4F4F7;--ink:#1D1B24;--ink-soft:#4A4756;--purple:#4E2E7F;--purple-soft:#6C4BA6;--lilac:#8C86A3;--line:rgba(29,27,36,.14);--serif:'Cormorant Garamond',Georgia,serif;--sans:'Manrope',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--ice);color:var(--ink);min-height:100vh;line-height:1.65;-webkit-font-smoothing:antialiased}
a{color:var(--purple);text-decoration:none}
a:hover{color:var(--purple-soft)}
.wrap{max-width:560px;margin:0 auto;padding:48px 28px 80px}
.back{font-family:var(--mono);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--lilac)}
.back:hover{color:var(--purple)}
h1{margin-top:48px;font-family:var(--serif);font-weight:500;font-size:clamp(2.4rem,6vw,3.4rem);color:var(--ink);line-height:1.1}
.lead{margin-top:14px;color:var(--ink-soft);font-size:.95rem}
form{margin-top:40px;display:grid;gap:22px}
label{display:grid;gap:8px;font-family:var(--mono);font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--lilac)}
input,textarea{width:100%;background:#FBFBFD;border:1px solid var(--line);border-radius:4px;padding:14px 16px;color:var(--ink);font-family:var(--sans);font-size:1rem;outline:none;transition:border-color .25s}
input:focus,textarea:focus{border-color:var(--purple)}
textarea{min-height:160px;resize:vertical}
button{justify-self:start;margin-top:8px;padding:14px 28px;border:1px solid var(--purple);border-radius:2px;background:var(--purple);color:#fff;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .25s,transform .25s}
button:hover{background:var(--purple-soft);border-color:var(--purple-soft);transform:translateY(-1px)}
.hint{margin-top:28px;font-size:.82rem;color:var(--lilac)}
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../index.html">← Amanda Britto</a>
    <h1>Entre em contato</h1>
    <p class="lead">Nome, e-mail e mensagem — ao enviar, seu aplicativo de e-mail abre para <strong>ab.murtinho@hotmail.com</strong>.</p>
    <form id="contactForm" novalidate>
      <label>Nome<input type="text" name="name" required autocomplete="name" placeholder="Seu nome"></label>
      <label>E-mail<input type="email" name="email" required autocomplete="email" placeholder="voce@email.com"></label>
      <label>Mensagem<textarea name="message" required placeholder="Sua mensagem"></textarea></label>
      <button type="submit">Enviar</button>
    </form>
    <p class="hint">Se o e-mail não abrir automaticamente, escreva para ab.murtinho@hotmail.com.</p>
  </div>
<script>
const TO='ab.murtinho@hotmail.com';
document.getElementById('contactForm').addEventListener('submit',function(e){
  e.preventDefault();
  const fd=new FormData(this);
  const name=(fd.get('name')||'').toString().trim();
  const email=(fd.get('email')||'').toString().trim();
  const message=(fd.get('message')||'').toString().trim();
  if(!name||!email||!message){alert('Preencha todos os campos.');return;}
  const subject=encodeURIComponent('Contato pelo site Amanda Britto — '+name);
  const body=encodeURIComponent('Nome: '+name+'\nE-mail: '+email+'\n\n'+message);
  window.location.href='mailto:'+TO+'?subject='+subject+'&body='+body;
});
</script>
</body>
</html>
