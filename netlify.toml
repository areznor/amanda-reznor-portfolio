[build]
  publish = "."
  command = "echo 'Static site — no build step'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/catalog/covers/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
