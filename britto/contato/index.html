<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Amanda Britto</title>
<meta name="description" content="Get in touch with Amanda Britto.">
<meta name="color-scheme" content="only light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ice:#F4F4F7;--ink:#1D1B24;--ink-soft:#4A4756;--purple:#4E2E7F;--purple-soft:#6C4BA6;--lilac:#8C86A3;--line:rgba(29,27,36,.14);--serif:'Cormorant Garamond',Georgia,serif;--sans:'Manrope',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#F4F4F7;color:#1D1B24}
body{font-family:var(--sans);min-height:100vh;line-height:1.65;-webkit-font-smoothing:antialiased}
a{color:var(--purple);text-decoration:none}
a:hover{color:var(--purple-soft)}
.wrap{max-width:560px;margin:0 auto;padding:48px 28px 80px}
.top{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.back{font-family:var(--mono);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--lilac)}
.lang-btn{border:1px solid var(--line);background:transparent;border-radius:99px;padding:7px 12px;cursor:pointer;font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;color:var(--ink)}
h1{margin-top:48px;font-family:var(--serif);font-weight:500;font-size:clamp(2.4rem,6vw,3.4rem);color:var(--ink);line-height:1.1}
.lead{margin-top:14px;color:var(--ink-soft);font-size:.95rem}
form{margin-top:40px;display:grid;gap:22px}
label{display:grid;gap:8px;font-family:var(--mono);font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--lilac)}
input,textarea{width:100%;background:#FBFBFD;border:1px solid var(--line);border-radius:4px;padding:14px 16px;color:var(--ink);font-family:var(--sans);font-size:1rem;outline:none;transition:border-color .25s}
input:focus,textarea:focus{border-color:var(--purple)}
textarea{min-height:160px;resize:vertical}
button[type=submit]{justify-self:start;margin-top:8px;padding:14px 28px;border:0;border-radius:2px;background:var(--purple);color:#fff;font-family:var(--mono);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .25s,transform .25s}
button[type=submit]:hover{background:var(--purple-soft);transform:translateY(-1px)}
.hint{margin-top:28px;font-size:.82rem;color:var(--lilac)}
.ok{display:none;margin-top:40px;padding:22px 24px;border:1px solid rgba(78,46,127,.28);border-radius:4px;background:rgba(78,46,127,.06);color:var(--ink)}
.ok.show{display:block}
.ok b{display:block;font-family:var(--serif);font-size:1.35rem;margin-bottom:8px;color:var(--purple)}
.hp{position:absolute;left:-9999px;opacity:0;height:0;width:0;overflow:hidden}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="../index.html" data-i18n="back">← Amanda Britto</a>
      <button type="button" class="lang-btn" id="langToggle" aria-label="Language">EN</button>
    </div>
    <h1 data-i18n="title">Get in touch</h1>
    <p class="lead" data-i18n="lead">Enter your name and email to send your message. Your contact will be returned as soon as possible.</p>
    <div class="ok" id="okBox" role="status"><b data-i18n="ok.title">Message sent</b><span data-i18n="ok.body">Thank you — your message was received and will be answered as soon as possible.</span></div>
    <form id="contactForm" name="contact-britto" method="POST" action="/britto/contato/?sent=1" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="contact-britto">
      <p class="hp"><label>Don’t fill this out <input name="bot-field" tabindex="-1" autocomplete="off"></label></p>
      <label><span data-i18n="name">Name</span><input type="text" name="name" required autocomplete="name" data-i18n-ph="ph.name" placeholder="Your name"></label>
      <label><span data-i18n="email">Email</span><input type="email" name="email" required autocomplete="email" data-i18n-ph="ph.email" placeholder="you@email.com"></label>
      <label><span data-i18n="message">Message</span><textarea name="message" required data-i18n-ph="ph.message" placeholder="Your message"></textarea></label>
      <button type="submit" data-i18n="send">Send</button>
    </form>
    <p class="hint" data-i18n="hint">Your message is sent securely through the site — no email app needed.</p>
  </div>
<script>
const LANGS=['en','pt','fr','es','it','de'];
const I18N={
  en:{back:'← Amanda Britto',title:'Get in touch',lead:'Enter your name and email to send your message. Your contact will be returned as soon as possible.',name:'Name',email:'Email',message:'Message',send:'Send',hint:'Your message is sent securely through the site — no email app needed.','ph.name':'Your name','ph.email':'you@email.com','ph.message':'Your message','ok.title':'Message sent','ok.body':'Thank you — your message was received and will be answered as soon as possible.'},
  pt:{back:'← Amanda Britto',title:'Entre em contato',lead:'Insira nome e e-mail para encaminhar a sua mensagem. Seu contato será retornado assim que possível.',name:'Nome',email:'E-mail',message:'Mensagem',send:'Enviar',hint:'Sua mensagem é enviada com segurança pelo site — sem abrir aplicativo de e-mail.','ph.name':'Seu nome','ph.email':'voce@email.com','ph.message':'Sua mensagem','ok.title':'Mensagem enviada','ok.body':'Obrigada — sua mensagem foi recebida e será respondida assim que possível.'},
  fr:{back:'← Amanda Britto',title:'Contact',lead:'Indiquez nom et e-mail pour envoyer votre message. Votre contact sera rappelé dès que possible.',name:'Nom',email:'E-mail',message:'Message',send:'Envoyer',hint:'Votre message est envoyé via le site — aucune application e-mail n’est nécessaire.','ph.name':'Votre nom','ph.email':'vous@email.com','ph.message':'Votre message','ok.title':'Message envoyé','ok.body':'Merci — votre message a été reçu et recevra une réponse dès que possible.'},
  es:{back:'← Amanda Britto',title:'Contacto',lead:'Introduce nombre y correo para enviar tu mensaje. Tu contacto será respondido lo antes posible.',name:'Nombre',email:'Correo',message:'Mensaje',send:'Enviar',hint:'Tu mensaje se envía de forma segura por el sitio — sin abrir una app de correo.','ph.name':'Tu nombre','ph.email':'tu@email.com','ph.message':'Tu mensaje','ok.title':'Mensaje enviado','ok.body':'Gracias — tu mensaje fue recibido y será respondido lo antes posible.'},
  it:{back:'← Amanda Britto',title:'Contatti',lead:'Inserisci nome e e-mail per inviare il messaggio. Il contatto sarà ricontattato il prima possibile.',name:'Nome',email:'E-mail',message:'Messaggio',send:'Invia',hint:'Il messaggio viene inviato in modo sicuro dal sito — senza aprire un’app di posta.','ph.name':'Il tuo nome','ph.email':'tu@email.com','ph.message':'Il tuo messaggio','ok.title':'Messaggio inviato','ok.body':'Grazie — il messaggio è stato ricevuto e riceverà risposta al più presto.'},
  de:{back:'← Amanda Britto',title:'Kontakt',lead:'Name und E-Mail eingeben, um die Nachricht zu senden. Dein Kontakt wird so bald wie möglich beantwortet.',name:'Name',email:'E-Mail',message:'Nachricht',send:'Senden',hint:'Deine Nachricht wird sicher über die Website gesendet — ohne E-Mail-App.','ph.name':'Dein Name','ph.email':'du@email.com','ph.message':'Deine Nachricht','ok.title':'Nachricht gesendet','ok.body':'Danke — deine Nachricht wurde empfangen und wird so bald wie möglich beantwortet.'}
};
let LANG='en';
function apply(){
  const d=I18N[LANG]||I18N.en;
  document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(d[k])el.textContent=d[k];});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{const k=el.getAttribute('data-i18n-ph');if(d[k])el.placeholder=d[k];});
  document.getElementById('langToggle').textContent=LANG.toUpperCase();
}
try{const s=localStorage.getItem('ab_lang');if(s&&LANGS.includes(s))LANG=s;}catch(e){}
apply();
document.getElementById('langToggle').onclick=()=>{
  LANG=LANGS[(LANGS.indexOf(LANG)+1)%LANGS.length];
  try{localStorage.setItem('ab_lang',LANG);}catch(e){}
  apply();
};
if(new URLSearchParams(location.search).get('sent')==='1'){
  document.getElementById('okBox').classList.add('show');
  document.getElementById('contactForm').style.display='none';
  document.querySelector('.hint').style.display='none';
}
</script>
</body>
</html>
